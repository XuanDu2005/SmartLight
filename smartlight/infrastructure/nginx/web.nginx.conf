server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Health endpoint used by Docker HEALTHCHECK
  location = /health {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # Long-cache hashed assets emitted by Vite (assets/* with hashes).
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback \u2014 every unknown path returns index.html so React Router works.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
