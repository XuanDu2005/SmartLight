# =============================================================================
# SmartLight Customer Web — nginx config (production)
#
# Listens on :80 inside the container (HTTPS terminated upstream by the
# reverse-proxy in the same compose stack). This file is intentionally
# defensive — it's the only public-facing layer for the SPA.
# =============================================================================

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reasonable client body size (uploads handled by the API directly).
  client_max_body_size 10m;
  client_body_timeout 60s;
  client_header_timeout 60s;
  keepalive_timeout 65s;
  send_timeout 60s;

  # ---------------------------------------------------------------------
  #  Security headers — applied to every response.
  # ---------------------------------------------------------------------
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # CSP — SPA only loads assets from self + the configured API origin.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.smartlight.vn; frame-ancestors 'self';" always;
  # HSTS — only honor when behind HTTPS (disabled in dev).
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ---------------------------------------------------------------------
  #  Compression — gzip on text-ish responses.
  # ---------------------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml;

  # ---------------------------------------------------------------------
  #  Health endpoint used by Docker HEALTHCHECK.
  # ---------------------------------------------------------------------
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # ---------------------------------------------------------------------
  #  Long-cache hashed assets emitted by Vite (assets/* with hashes).
  # ---------------------------------------------------------------------
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---------------------------------------------------------------------
  #  Service worker / favicon / robots — pass-through.
  # ---------------------------------------------------------------------
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
  location = /favicon.ico { access_log off; log_not_found off; }

  # ---------------------------------------------------------------------
  #  SPA fallback — every unknown path returns index.html so React
  #  Router (BrowserRouter) can take over client-side routing.
  # ---------------------------------------------------------------------
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}