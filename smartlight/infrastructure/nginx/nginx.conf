# =============================================================================
# SmartLight — main nginx.conf (production reverse proxy)
#
# Loaded by nginx:1.27-alpine. Mounts:
#   - /etc/nginx/nginx.conf          ← this file
#   - /etc/nginx/conf.d/*.conf       ← HTTP server blocks (80, 443)
#   - /etc/nginx/ssl.conf            ← TLS settings (shared)
#   - /etc/nginx/certs/              ← TLS material (RO volume)
#
# Includes:
#   - gzip (always on)
#   - rate limiting zone (shared)
#   - upstream definitions per service
#   - proxy_cache path on /var/cache/nginx
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # ----- MIME + charset -----------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ----- Logging format ----------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    log_format  json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"x_request_id":"$http_x_request_id"'
        '}';

    access_log  /var/log/nginx/access.log  main;

    # ----- Performance --------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;

    # 10 MB upload limit (gateway → API) — also enforced inside the app.
    client_max_body_size      10m;
    client_body_buffer_size   128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout       60s;
    client_header_timeout     60s;
    send_timeout              60s;
    reset_timedout_connection on;

    # ----- Gzip --------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_min_length     1024;
    gzip_disable        "msie6";
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/manifest+json
        application/rss+xml
        application/vnd.api+json
        application/xml
        application/xhtml+xml
        application/x-font-ttf
        application/x-web-app-manifest+json
        font/opentype
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/javascript
        text/plain
        text/xml;

    # ----- Rate limiting zones (shared across server blocks) -----------
    limit_req_zone  $binary_remote_addr  zone=api_rl:10m  rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=auth_rl:10m rate=5r/s;
    limit_req_zone  $binary_remote_addr  zone=web_rl:10m  rate=50r/s;

    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Connection limit per IP.
    limit_conn conn_per_ip 50;

    # ----- Proxy defaults ----------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;
    proxy_set_header   X-Correlation-ID  $http_x_correlation_id;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_buffering       on;
    proxy_buffer_size     8k;
    proxy_buffers         8 16k;
    proxy_busy_buffers_size 32k;

    # ----- Cache path --------------------------------------------------
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # ----- Upstreams (resolve via Docker DNS) --------------------------
    upstream smartlight_api {
        server api:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream smartlight_web {
        server web:5173 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream smartlight_admin {
        server admin:5174 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ----- Server blocks ----------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}