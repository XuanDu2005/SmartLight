# =============================================================================
# SmartLight — TLS / SSL settings (shared)
# Modern configuration: TLS 1.2 + TLS 1.3 only, AEAD ciphers, OCSP stapling,
# session resumption, ssl_session_tickets off.
# =============================================================================

ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_ecdh_curve            X25519:secp384r1;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;
ssl_stapling              on;
ssl_stapling_verify       on;
resolver                  1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout          5s;

# HSTS — 2 years, include subdomains, preload-ready.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Diffie-Hellman params (regenerated on host; mount via /etc/nginx/certs/dhparam.pem if needed).
ssl_dhparam /etc/nginx/certs/dhparam.pem;