# =============================================================================
# SmartLight — conf.d/*.conf
#
# Three server blocks:
#   1. 00-redirect-http-to-https.conf  — HTTP :80 → 301 HTTPS :443
#   2. 10-app-web.conf                — HTTPS :443 root → web SPA, /v1 → api
#   3. 20-app-admin.conf              — HTTPS :443 /admin/* → admin SPA + /v1 → api
#
# The single :443 block serves both storefront and admin. The admin SPA is
# mounted under /admin/* (path-based separation) which is simpler than a
# second vhost (and works fine with a single cert for *.smartlight.vn).
# =============================================================================

# ---------------------------------------------------------------------------
# 1) HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME http-01 challenge must remain on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Internal nginx health probe (used by Docker HEALTHCHECK).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Everything else is permanently redirected to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# 2) Customer storefront — HTTPS :443
#    - /          → web SPA
#    - /v1/*      → api (with rate-limit + cache)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartlight.vn www.smartlight.vn;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    include /etc/nginx/ssl.conf;

    # Shared security headers for the SPA surface.
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.smartlight.vn https://www.google-analytics.com; frame-ancestors 'self';" always;

    # Web rate limit.
    limit_req zone=web_rl burst=100 nodelay;

    # ----------- API (NestJS) — under /v1 --------------------------------
    location /v1/ {
        limit_req zone=api_rl burst=60 nodelay;

        # Cache only GETs that look cacheable (the API itself sets Cache-Control).
        proxy_pass http://smartlight_api;

        proxy_cache        api_cache;
        proxy_cache_valid  200 5m;
        proxy_cache_valid  404 1m;
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;

        # WebSocket / SSE support (BullMQ arena, future chat, etc.).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----------- Customer SPA --------------------------------------------
    location / {
        # Allow the SPA to be served from cache when feasible.
        proxy_pass http://smartlight_web;
        proxy_set_header Host $host;
    }
}

# ---------------------------------------------------------------------------
# 3) Admin — HTTPS :443 /admin/*
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.smartlight.vn;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    include /etc/nginx/ssl.conf;

    # Stricter headers for the admin surface.
    add_header X-Frame-Options          "DENY" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.smartlight.vn; frame-ancestors 'none';" always;

    # Stricter rate limit on admin endpoints.
    limit_req zone=auth_rl burst=20 nodelay;

    # Admin API.
    location /v1/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://smartlight_api;
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Admin SPA shell.
    location / {
        proxy_pass http://smartlight_admin;
        proxy_set_header Host $host;
    }
}