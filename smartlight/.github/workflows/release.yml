name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  release:
    name: Build and push release images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [api, web, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: matrix.target == 'api'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          push: ${{ matrix.target == 'api' }}
          load: ${{ matrix.target != 'api' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartlight-${{ matrix.target }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/smartlight-${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release notes
        if: matrix.target == 'api'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false